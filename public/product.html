<!DOCTYPE html>
<html lang="sq" style="scroll-behavior: smooth;">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Romeo Grill | Duke Ngarkuar Detajet e Pjates...</title>
  
  <meta name="description" content="Zbuloni me shume rreth pjatave tona te zgares dhe fast food.">
  <meta name="theme-color" content="#E11D48">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    /* Product Dedicated View Extensions */
    .product-hero {
      position: relative;
      height: 60vh;
      min-height: 400px;
      padding-top: var(--header-height);
      display: flex;
      align-items: flex-end;
      overflow: hidden;
      background: #111;
    }
    
    .product-hero-bg {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.6;
      transition: opacity 0.5s ease;
    }

    .product-hero-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(to top, var(--color-bg) 5%, transparent 70%, rgba(0,0,0,0.6));
    }

    .product-gallery-nav {
      position: absolute;
      top: 50%;
      width: 100%;
      display: flex;
      justify-content: space-between;
      padding: 0 5%;
      pointer-events: none;
      z-index: 10;
      transform: translateY(-50%);
    }

    .gal-btn {
      pointer-events: auto;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      color: white;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 1.5rem;
    }

    .gal-btn:hover {
      background: var(--color-primary);
      transform: scale(1.1);
    }
    
    .gal-btn.disabled {
      opacity: 0.3;
      pointer-events: none;
    }

    .product-info-segment {
      position: relative;
      z-index: 5;
      max-width: 800px;
      margin: 0 auto;
      margin-top: -60px;
      padding: 0 var(--spacing-md);
    }

    .product-card {
      background: var(--color-card-bg);
      border: 1px solid var(--color-card-border);
      border-radius: 24px;
      padding: var(--spacing-xl);
      backdrop-filter: blur(16px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.5), 0 0 40px rgba(225, 29, 72, 0.05);
      margin-bottom: var(--spacing-xl);
      transform: translateY(20px);
      animation: floatUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes floatUp {
      from { transform: translateY(40px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .product-title-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: var(--spacing-md);
      gap: var(--spacing-md);
    }

    .product-page-title {
      font-size: clamp(2rem, 5vw, 3rem);
      margin: 0;
      font-weight: 900;
      letter-spacing: -0.02em;
      color: var(--color-text);
      line-height: 1.1;
    }

    .product-page-price {
      font-size: 1.7rem;
      font-weight: 800;
      color: #fce7f3;
      white-space: nowrap;
      background: rgba(225, 29, 72, 0.15);
      backdrop-filter: blur(8px);
      padding: 10px 20px;
      border-radius: 16px;
      border: 1px solid rgba(225, 29, 72, 0.3);
      box-shadow: 0 4px 20px rgba(225, 29, 72, 0.1);
    }

    .product-section-title {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: #71717a;
      margin-top: var(--spacing-lg);
      margin-bottom: var(--spacing-md);
      font-weight: 700;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      padding-bottom: 8px;
    }

    .product-page-desc {
      color: #a1a1aa;
      font-size: 1.15rem;
      line-height: 1.7;
      font-weight: 300;
      margin-bottom: var(--spacing-lg);
    }

    .ingredients-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .ingredient-chip {
      background: rgba(255,255,255,0.03);
      color: #e4e4e7;
      padding: 8px 16px;
      border-radius: 12px;
      font-size: 0.95rem;
      border: 1px solid rgba(255,255,255,0.08);
      font-weight: 500;
      transition: all 0.3s ease;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    .ingredient-chip:hover {
      background: rgba(255,255,255,0.08);
      transform: translateY(-2px);
      border-color: rgba(255,255,255,0.2);
    }

    .product-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 2rem;
      padding-top: 1rem;
      border-top: 1px solid rgba(255,255,255,0.05); /* Premium separation */
    }

    .btn-back {
      background: transparent;
      border: 1px solid #3f3f46;
      color: #a1a1aa;
      font-weight: 600;
      border-radius: 16px;
      transition: all 0.3s ease;
    }
    
    .btn-back:hover {
      background: rgba(255,255,255,0.05);
      color: #fff;
      border-color: #52525b;
    }

    #productOrderBtn {
      background: linear-gradient(135deg, #e11d48, #be123c);
      box-shadow: 0 4px 20px rgba(225, 29, 72, 0.4);
      color: #fff;
      border: none;
      border-radius: 16px;
      font-weight: 700;
      transition: all 0.3s ease;
    }
    #productOrderBtn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 25px rgba(225, 29, 72, 0.5);
    }
    
    .gallery-thumbnails {
      display: flex;
      gap: 12px;
      margin-top: var(--spacing-md);
      overflow-x: auto;
      padding-bottom: 12px;
      scrollbar-width: none;
    }
    
    .gallery-thumbnails::-webkit-scrollbar {
      display: none;
    }
    
    .gal-thumb {
      width: 70px;
      height: 70px;
      border-radius: 12px;
      object-fit: cover;
      cursor: pointer;
      opacity: 0.5;
      transition: all 0.3s ease;
      border: 2px solid transparent;
      flex-shrink: 0;
    }
    
    .gal-thumb.active {
      opacity: 1;
      border-color: var(--color-primary);
      transform: scale(1.05);
    }

    @media (max-width: 720px) {
      .product-title-row {
        flex-direction: column;
      }
      .product-page-price {
        align-self: flex-start;
      }
      .product-actions {
        grid-template-columns: 1fr;
      }
      .product-card {
        padding: var(--spacing-lg);
        border-radius: 20px;
      }
    }
  </style>
</head>
<body>

<header class="header">
  <div class="container nav">
    <a href="/" class="brand">
      <span class="brand-title" id="brandTitle">ROMEO GRILL</span>
    </a>
    <nav class="nav-links" id="navLinks">
      <a href="/#menu">← Kthehu te Menuja</a>
      <a href="/en/product.html" class="lang-switch" id="langSwitch" title="English">🇬🇧 EN</a>
    </nav>
  </div>
</header>

<main>
  <!-- Hero / Gallery Area -->
  <section class="product-hero">
    <img id="productMainImage" src="" alt="Vizualizim i Pjates" class="product-hero-bg">
    <div class="product-hero-overlay"></div>
    
    <div class="product-gallery-nav" id="galleryNav" style="display:none;">
      <div class="gal-btn" id="prevBtn">←</div>
      <div class="gal-btn" id="nextBtn">→</div>
    </div>
  </section>

  <!-- Product Information Board -->
  <section class="product-info-segment">
    <div class="product-card">
      <div class="product-adj-nav" style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid rgba(255,255,255,0.05);">
        <button id="prevDishBtn" class="btn" style="padding: 10px 18px; font-size: 1rem; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 12px; color: #fff; display: flex; align-items: center; gap: 6px;" aria-label="Previous Dish"><span>&larr;</span> <span>Para</span></button>
        <button id="nextDishBtn" class="btn" style="padding: 10px 18px; font-size: 1rem; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 12px; color: #fff; display: flex; align-items: center; gap: 6px;" aria-label="Next Dish"><span>Tjetra</span> <span>&rarr;</span></button>
      </div>
      <div class="product-title-row">
        <h1 class="product-page-title" id="productName">Duke ngarkuar...</h1>
        <div class="product-page-price" id="productPrice">-- Leke</div>
      </div>
      
      <p class="product-page-desc" id="productDesc">Ju lutem prisni, detajet po ngarkohen.</p>
      
      <div id="galleryThumbContainer" class="gallery-thumbnails" style="display:none;"></div>

      <div id="ingredientsContainer" style="display: none;">
        <div class="product-section-title">Perberesit Kryesore</div>
        <div class="ingredients-list" id="productIngredients"></div>
      </div>

      <div class="product-actions">
        <a href="/#menu" class="btn btn-large btn-back full">
          <span class="btn-icon">←</span> Kthehu mbrapa
        </a>
        <a class="btn btn-primary btn-glow btn-large full" id="productOrderBtn" href="#" target="_blank" rel="noopener">
          Porosit Tani <span class="btn-icon">💬</span>
        </a>
      </div>
    </div>
  </section>
</main>

<script src="product.js"></script>
</body>
</html>
