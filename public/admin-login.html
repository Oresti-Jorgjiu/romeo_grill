<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Romeo Grill | Admin Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="login">
  <div class="login-bg">
    <img src="images/hero_ultimate.jpg" alt="Romeo Grill Background">
  </div>
  <div class="login-shell">
    <div class="login-card">
      <span class="section-tag">Admin Panel</span>
      <h2>Log in to Dashboard</h2>
      <p class="muted">Enter your credentials to manage the Romeo Grill website content and analytics.</p>
      
      <form id="loginForm">
        <input class="form-control" id="username" placeholder="Username" autocomplete="username" required>
        <input class="form-control" id="password" type="password" placeholder="Password" autocomplete="current-password" required>
        <button class="btn btn-primary full" type="submit">Log In to Dashboard</button>
      </form>
      
      <div id="loginError"></div>

      <div class="login-footer">
        <a href="/">← Back to Website</a>
      </div>
    </div>
  </div>
  <script src="admin.js"></script>
</body>
</html>
